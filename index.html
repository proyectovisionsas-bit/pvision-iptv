<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#05080f">
<title>PVISION IPTV · Ingreso</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap');
  :root{
    --bg:#05080f; --glass:rgba(14,22,40,.62);
    --line:rgba(60,230,230,.28); --cyan:#22e8e0; --cyan-glow:rgba(34,232,224,.55);
    --mag:#ff3caa; --ink:#dbf3ff;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:linear-gradient(135deg,var(--bg) 0,#0a0f20 100%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:'Rajdhani',sans-serif;color:var(--ink);
    overflow:hidden;position:relative;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0),rgba(0,0,0,0) 2px,rgba(0,0,0,.08) 3px);
    pointer-events:none;z-index:1;
  }
  .container{position:relative;z-index:2;text-align:center;max-width:420px;padding:30px}
  .logo-box{margin-bottom:40px}
  .logo-box img{width:100px;height:100px;display:block;margin:0 auto;border:2px solid var(--cyan);border-radius:12px;box-shadow:0 0 20px var(--cyan-glow)}
  .logo-box .brand{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;letter-spacing:2px;margin-top:16px;color:#fff}
  .logo-box .sub{font-size:13px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-top:4px}

  .login-panel{background:var(--glass);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:12px;padding:36px 28px;box-shadow:0 0 40px rgba(34,232,224,.2)}
  .login-panel::before,.login-panel::after{content:'';position:absolute;width:18px;height:18px;pointer-events:none}
  .login-panel::before{top:-1px;left:-1px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);border-radius:12px 0 0 0}
  .login-panel::after{bottom:-1px;right:-1px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);border-radius:0 0 12px 0}

  .login-panel h1{font-family:'Orbitron',sans-serif;font-size:20px;margin-bottom:10px;font-weight:900}
  .login-panel .hint{font-size:13px;color:#7f9bb5;margin-bottom:28px}

  .field{margin-bottom:22px;text-align:left}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--cyan);margin-bottom:8px;font-weight:700}
  .field input{width:100%;background:rgba(10,16,30,.8);border:1px solid var(--line);border-radius:6px;padding:14px 16px;color:var(--ink);outline:none;font-family:monospace;font-size:16px;text-align:center}
  .field input:focus{border-color:var(--cyan);box-shadow:0 0 12px var(--cyan-glow)}

  .pin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:26px}
  .pin-btn{background:var(--glass);border:1px solid var(--line);color:var(--ink);padding:16px;border-radius:6px;font-size:18px;font-weight:700;cursor:pointer;transition:.15s;font-family:monospace}
  .pin-btn:hover{border-color:var(--cyan);box-shadow:0 0 10px var(--cyan-glow)}
  .pin-display{background:rgba(10,16,30,.9);border:1px solid var(--line);border-radius:6px;padding:18px;margin-bottom:18px;font-family:monospace;font-size:24px;letter-spacing:4px;min-height:56px;display:flex;align-items:center;justify-content:center}

  .btn-group{display:flex;gap:8px}
  .btn{flex:1;padding:14px;border:none;border-radius:6px;font-weight:700;font-size:14px;cursor:pointer;transition:.18s;text-transform:uppercase;letter-spacing:1px;font-family:inherit}
  .btn.primary{background:linear-gradient(120deg,var(--cyan),#19b9b3);color:#021014;box-shadow:0 0 16px var(--cyan-glow)}
  .btn.primary:hover{filter:brightness(1.15)}
  .btn.secondary{background:var(--glass);border:1px solid var(--line);color:var(--ink)}
  .btn.secondary:hover{border-color:var(--cyan)}

  .message{margin-top:14px;font-size:12px;min-height:16px}
  .message.info{color:var(--cyan)}
  .message.error{color:var(--mag)}
  .message.success{color:#4ade80}

  .signup{margin-top:24px;font-size:12px;color:#7f9bb5}
  .signup button{background:none;border:none;color:var(--cyan);cursor:pointer;font-weight:700;text-decoration:underline}
  .signup button:hover{color:#fff}

  @media(max-width:480px){
    .container{padding:20px}
    .login-panel{padding:28px 20px}
    .pin-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo-box">
    <img id="logoImg" src="" alt="PVISION">
    <div class="brand">PVISION</div>
    <div class="sub">IPTV</div>
  </div>

  <div class="login-panel" id="loginPanel">
    <h1>INGRESO</h1>
    <p class="hint">Ingresa tu PIN de 4 dígitos</p>

    <div class="pin-display" id="pinDisplay">····</div>

    <div class="pin-grid">
      <button class="pin-btn" data-num="1">1</button>
      <button class="pin-btn" data-num="2">2</button>
      <button class="pin-btn" data-num="3">3</button>
      <button class="pin-btn" data-num="4">4</button>
      <button class="pin-btn" data-num="5">5</button>
      <button class="pin-btn" data-num="6">6</button>
      <button class="pin-btn" data-num="7">7</button>
      <button class="pin-btn" data-num="8">8</button>
      <button class="pin-btn" data-num="9">9</button>
      <button class="pin-btn" data-num="0">0</button>
      <button class="pin-btn" id="clearBtn" style="grid-column:span 2">← Borrar</button>
      <button class="pin-btn" id="enterBtn" style="grid-column:span 2;background:rgba(34,232,224,.2);border-color:var(--cyan)">Entrar →</button>
    </div>

    <div class="btn-group">
      <button class="btn primary" id="loginBtn">Verificar PIN</button>
    </div>

    <div class="message" id="message"></div>

    <div class="signup">
      ¿Primera vez? <button id="setupBtn">Crear PIN</button>
    </div>
  </div>

  <div class="login-panel" id="setupPanel" style="display:none">
    <h1>CREAR PIN</h1>
    <p class="hint">Elige un PIN de 4 dígitos</p>

    <div class="pin-display" id="setupPinDisplay">····</div>

    <div class="pin-grid">
      <button class="pin-btn" data-num="1">1</button>
      <button class="pin-btn" data-num="2">2</button>
      <button class="pin-btn" data-num="3">3</button>
      <button class="pin-btn" data-num="4">4</button>
      <button class="pin-btn" data-num="5">5</button>
      <button class="pin-btn" data-num="6">6</button>
      <button class="pin-btn" data-num="7">7</button>
      <button class="pin-btn" data-num="8">8</button>
      <button class="pin-btn" data-num="9">9</button>
      <button class="pin-btn" data-num="0">0</button>
      <button class="pin-btn" id="clearSetupBtn" style="grid-column:span 2">← Borrar</button>
      <button class="pin-btn" id="saveBtn" style="grid-column:span 2;background:rgba(76,217,100,.2);border-color:#4ade80">Guardar →</button>
    </div>

    <div class="btn-group">
      <button class="btn primary" id="saveSetupBtn">Guardar PIN</button>
      <button class="btn secondary" id="backBtn">Volver</button>
    </div>

    <div class="message" id="setupMessage"></div>
  </div>
</div>

// Login
let pinEntry='';
document.querySelectorAll('#loginPanel .pin-btn[data-num]').forEach(btn=>{
  btn.onclick=()=>{
    if(pinEntry.length<4){ pinEntry+=btn.dataset.num; $('pinDisplay').textContent='•'.repeat(pinEntry.length)+'·'.repeat(4-pinEntry.length); }
  };
});
$('clearBtn').onclick=()=>{ pinEntry=''; $('pinDisplay').textContent='····'; };
$('enterBtn').onclick=$('loginBtn').onclick=()=>{
  const saved=store.get('pvision_pin');
  if(!saved){ $('message').innerHTML='<span class="error">PIN no configurado.</span>'; return; }
  if(pinEntry===saved){ store.set('pvision_session','1'); window.location='app.html'; }
  else{ $('message').innerHTML='<span class="error">PIN incorrecto.</span>'; pinEntry=''; $('pinDisplay').textContent='····'; }
};

// Setup
let setupPin='';
document.querySelectorAll('#setupPanel .pin-btn[data-num]').forEach(btn=>{
  btn.onclick=()=>{
    if(setupPin.length<4){ setupPin+=btn.dataset.num; $('setupPinDisplay').textContent='•'.repeat(setupPin.length)+'·'.repeat(4-setupPin.length); }
  };
});
$('clearSetupBtn').onclick=()=>{ setupPin=''; $('setupPinDisplay').textContent='····'; };
$('saveBtn').onclick=$('saveSetupBtn').onclick=()=>{
  if(setupPin.length!==4){ $('setupMessage').innerHTML='<span class="error">El PIN debe tener 4 dígitos.</span>'; return; }
  store.set('pvision_pin',setupPin);
  $('setupMessage').innerHTML='<span class="success">PIN guardado. Ingresa para continuar.</span>';
  setTimeout(()=>{ $('setupPanel').style.display='none'; $('loginPanel').style.display='block'; pinEntry=''; $('pinDisplay').textContent='····'; },1200);
};

$('setupBtn').onclick=()=>{ $('loginPanel').style.display='none'; $('setupPanel').style.display='block'; };
$('backBtn').onclick=()=>{ $('setupPanel').style.display='none'; $('loginPanel').style.display='block'; };

// Auto-check si ya está logueado
if(store.get('pvision_session')){ window.location='app.html'; }

// Si no hay PIN guardado, mostrar setup
if(!store.get('pvision_pin')){ $('loginPanel').style.display='none'; $('setupPanel').style.display='block'; }
</script>
