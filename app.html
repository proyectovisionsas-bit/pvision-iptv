<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#05080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PVISION IPTV">
<title>PVISION IPTV</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&family=Spline+Sans+Mono:wght@500;600&display=swap');
  :root{
    --bg:#05080f; --glass:rgba(14,22,40,.62); --glass-2:rgba(10,16,30,.78);
    --line:rgba(60,230,230,.16); --line-2:rgba(60,230,230,.28);
    --cyan:#22e8e0; --cyan-glow:rgba(34,232,224,.55); --mag:#ff3caa; --ink:#dbf3ff;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Rajdhani',sans-serif;height:100vh;overflow:hidden;position:relative}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:linear-gradient(transparent 0,transparent calc(100% - 1px),rgba(34,232,224,.05) 100%) 0 0/100% 42px,
      linear-gradient(90deg,transparent 0,transparent calc(100% - 1px),rgba(34,232,224,.05) 100%) 0 0/42px 100%;
  }
  body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0),rgba(0,0,0,0) 2px,rgba(0,0,0,.10) 3px);
  }
  .app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}
  
  header{background:var(--glass-2);backdrop-filter:blur(14px);padding:12px 20px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:16px}
  .logo-header{display:flex;align-items:center;gap:10px;font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;letter-spacing:1px}
  .logo-header img{width:32px;height:32px;border-radius:6px;border:1px solid var(--cyan)}
  .spacer{flex:1}
  .btn{background:linear-gradient(120deg,var(--cyan),#19b9b3);color:#021014;padding:10px 18px;border-radius:5px;border:none;font-weight:700;cursor:pointer;font-size:13px;text-transform:uppercase;letter-spacing:.5px}
  .btn:hover{filter:brightness(1.15)}
  .btn.ghost{background:var(--glass);border:1px solid var(--line-2);color:var(--cyan)}

  main{flex:1;display:grid;grid-template-columns:1fr 440px;gap:14px;padding:14px;min-height:0}
  
  .panel{background:var(--glass);border:1px solid var(--line-2);border-radius:8px;backdrop-filter:blur(12px);display:flex;flex-direction:column;overflow:hidden}
  .panel::before{content:'';position:absolute;width:18px;height:18px;top:-1px;left:-1px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);border-radius:8px 0 0 0;pointer-events:none}
  .panel::after{content:'';position:absolute;width:18px;height:18px;bottom:-1px;right:-1px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);border-radius:0 0 8px 0;pointer-events:none}
  .panel{position:relative}

  .player-wrap{flex:1;display:flex;flex-direction:column}
  .video-shell{flex:1;position:relative;background:#000;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center}
  video{width:100%;height:100%;object-fit:contain;background:#000}
  .placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#7f9bb5;text-align:center}
  .placeholder h2{font-family:'Orbitron',sans-serif;font-size:18px;color:#fff;font-weight:700}
  .placeholder p{font-size:14px;max-width:340px;line-height:1.5}

  .now-playing{padding:14px 16px;background:var(--glass-2);border-top:1px solid var(--line-2);display:flex;align-items:center;gap:12px;border-radius:0 0 8px 8px;min-height:60px}
  .np-logo{width:38px;height:38px;border-radius:6px;object-fit:cover;background:#000;border:1px solid var(--line-2);flex-shrink:0}
  .np-info{flex:1;min-width:0}
  .np-info .label{font-family:'Spline Sans Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:var(--cyan)}
  .np-info .title{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .badge{font-family:'Spline Sans Mono',monospace;font-size:9px;padding:5px 9px;border-radius:4px;border:1px solid var(--line-2);color:#7f9bb5;text-transform:uppercase;letter-spacing:.5px}
  .badge.live{color:var(--mag);border-color:var(--mag);background:rgba(255,60,170,.08)}

  .sidebar{display:flex;flex-direction:column}
  .side-head{padding:14px 14px;border-bottom:1px solid var(--line-2)}
  .side-head .count{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;margin-bottom:10px}
  .side-head .count span{color:var(--cyan);margin-left:6px}
  .search{width:100%;background:var(--glass-2);border:1px solid var(--line-2);border-radius:5px;padding:11px 12px;color:var(--ink);outline:none;font-family:'Spline Sans Mono',monospace;font-size:12px}
  .search:focus{border-color:var(--cyan);box-shadow:0 0 10px var(--cyan-glow)}

  .channels{flex:1;overflow-y:auto;padding:6px}
  .channels::-webkit-scrollbar{width:8px}
  .channels::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px}

  .group-head{padding:10px 12px;cursor:pointer;border-radius:5px;display:flex;align-items:center;gap:8px;user-select:none}
  .group-head:hover{background:var(--glass-2)}
  .group-head .caret{font-size:10px;transition:.2s;color:var(--cyan)}
  .group-head.collapsed .caret{transform:rotate(-90deg)}
  .group-head .gname{font-weight:700;font-size:12px;flex:1;text-transform:uppercase;letter-spacing:.5px}
  .group-head .gcount{font-family:'Spline Sans Mono',monospace;font-size:10px;color:var(--cyan)}
  .group-body.hidden{display:none}

  .channel{padding:10px 12px;border-radius:5px;cursor:pointer;transition:.12s;margin-bottom:2px;border-left:2px solid transparent;display:flex;gap:10px;align-items:center}
  .channel:hover{background:var(--glass-2);border-left-color:var(--mag)}
  .channel.active{background:rgba(34,232,224,.1);border-left-color:var(--cyan)}
  .ch-num{width:32px;height:32px;border-radius:5px;background:var(--glass-2);border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;font-family:'Spline Sans Mono',monospace;font-size:12px;color:var(--cyan);flex-shrink:0}
  .ch-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .empty-list{padding:40px 16px;text-align:center;color:#7f9bb5;font-size:12px;line-height:1.5}

  .upload-hint{padding:10px 14px;background:var(--glass-2);border-radius:5px;border:1px dashed var(--line-2);text-align:center;font-size:11px;color:#7f9bb5}

  .menu-btn{width:44px;height:44px;border-radius:6px;background:var(--glass);border:1px solid var(--line-2);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
  .menu-btn:hover{border-color:var(--cyan)}

  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .modal.show{display:flex}
  .modal-content{background:var(--glass);border:1px solid var(--line-2);border-radius:12px;padding:24px;max-width:480px;width:90%;backdrop-filter:blur(14px)}
  .modal-content h2{font-family:'Orbitron',sans-serif;font-size:18px;margin-bottom:12px;color:#fff}
  .modal-content p{font-size:13px;margin-bottom:16px;color:#7f9bb5}
  .input-field{margin-bottom:14px}
  .input-field input{width:100%;background:var(--glass-2);border:1px solid var(--line-2);border-radius:6px;padding:12px;color:var(--ink);outline:none;font-family:monospace;font-size:13px}
  .input-field input:focus{border-color:var(--cyan);box-shadow:0 0 10px var(--cyan-glow)}
  .modal-buttons{display:flex;gap:8px;margin-top:18px}
  .modal-buttons button{flex:1;padding:11px;border:none;border-radius:6px;cursor:pointer;font-weight:700}
  .modal-buttons .btn-ok{background:var(--cyan);color:#021014}
  .modal-buttons .btn-cancel{background:var(--glass-2);border:1px solid var(--line-2);color:var(--ink)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--glass-2);backdrop-filter:blur(14px);border:1px solid var(--cyan);padding:12px 20px;border-radius:6px;font-size:13px;box-shadow:0 0 20px var(--cyan-glow);transition:.3s;z-index:200}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.warn{border-color:#ffb454;color:#ffb454}

  input[type=file]{display:none}

  @media(max-width:920px){
    main{grid-template-columns:1fr;grid-template-rows:48vh 1fr;gap:10px;padding:10px}
    .video-shell{border-radius:8px}
  }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo-header">
    <img id="logoImg" src="" alt="">
    <span>PVISION</span>
  </div>
  <div class="spacer"></div>
  <button class="btn" id="cargarBtn">+ Cargar lista</button>
  <button class="btn ghost" id="salirBtn">Salir</button>
</header>

<main>
  <div class="panel player-wrap">
    <div class="video-shell">
      <video id="video" controls playsinline></video>
      <div class="placeholder" id="placeholder">
        <h2>SISTEMA EN ESPERA</h2>
        <p>Carga una lista M3U para reproducir</p>
        <div style="margin-top:18px;background:rgba(10,16,30,.85);border:1px solid var(--mag);border-radius:10px;padding:16px 28px;text-align:center;box-shadow:0 0 22px rgba(255,60,170,.35)">
          <div style="font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--mag);text-transform:uppercase">// código de este equipo</div>
          <div id="pairCode" style="font-family:'Orbitron',sans-serif;font-size:40px;font-weight:900;letter-spacing:8px;color:#fff;margin:8px 0;text-shadow:0 0 16px var(--cyan)">······</div>
          <div id="pairStatus" style="font-family:'Spline Sans Mono',monospace;font-size:10px;color:#7f9bb5;text-transform:uppercase;letter-spacing:1px">Esperando señal remota…</div>
        </div>
      </div>
    </div>
    <div class="now-playing">
      <img class="np-logo" id="npLogo" alt="" style="display:none">
      <div class="np-info">
        <div class="label" id="npLabel">// en espera</div>
        <div class="title" id="npTitle">—</div>
      </div>
      <span class="badge" id="npBadge">standby</span>
    </div>
  </div>

  <div class="panel sidebar">
    <div class="side-head">
      <div class="count">// Canales<span id="chCount">0</span></div>
      <input class="search" id="searchInput" placeholder="⌕ buscar…" spellcheck="false">
    </div>
    <div class="channels" id="channels">
      <div class="empty-list">Sin lista cargada. Usa el botón "+Cargar".</div>
    </div>
  </div>
</main>

<!-- Modal cargar URL -->
<div class="modal" id="modalCargar">
  <div class="modal-content">
    <h2>Cargar lista M3U</h2>
    <p>Pega la URL de tu lista .m3u / .m3u8</p>
    <div class="input-field">
      <input id="urlInput" placeholder="https://ejemplo.com/lista.m3u8" spellclick="false">
    </div>
    <div class="modal-buttons">
      <button class="btn-ok" id="cargarUrlBtn">Cargar</button>
      <button class="btn-cancel" id="cerrarModal">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept=".m3u,.m3u8">

</div>

  setJSON(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

const video=$('video'), placeholder=$('placeholder'), channelsEl=$('channels'), searchInput=$('searchInput');
const chCount=$('chCount'), npTitle=$('npTitle'), npLabel=$('npLabel'), npBadge=$('npBadge'), npLogo=$('npLogo');
let channels=[], activeIdx=-1, hls=null;
let favorites=store.getJSON('pvision_favs',[]);

function toast(msg, warn){ const t=$('toast'); t.textContent=msg; t.className='toast show'+(warn?' warn':''); clearTimeout(t._timer); t._timer=setTimeout(()=>t.className='toast',3500); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function parseM3U(text){
  const lines=text.split(/\r?\n/); const out=[]; let cur=null;
  for(let raw of lines){
    const line=raw.trim(); if(!line) continue;
    if(line.startsWith('#EXTINF')){
      const comma=line.indexOf(',');
      const attr=line.substring(0,comma);
      const name=comma>=0?line.substring(comma+1).trim():'';
      const ga=k=>{const m=attr.match(new RegExp(k+'="([^"]*)"'));return m?m[1]:'';};
      cur={name:name||ga('tvg-name')||'Sin nombre', logo:ga('tvg-logo'), group:ga('group-title')||'General', url:''};
    } else if(line.startsWith('#')){ continue; }
    else { if(cur){ cur.url=line; out.push(cur); cur=null; } else out.push({name:line.split('/').pop()||'Stream', logo:'', group:'General', url:line}); }
  }
  return out;
}

function renderChannels(filter=''){
  const f=(filter||'').toLowerCase();
  chCount.textContent=channels.length;
  if(!channels.length){ channelsEl.innerHTML='<div class="empty-list">Sin lista cargada.</div>'; return; }
  const match=channels.map((c,i)=>({c,i})).filter(({c})=>c.name.toLowerCase().includes(f)||c.group.toLowerCase().includes(f));
  if(!match.length){ channelsEl.innerHTML='<div class="empty-list">Sin resultados.</div>'; return; }
  const groups={}; match.forEach(({c,i})=>{ (groups[c.group]=groups[c.group]||[]).push({c,i}); });
  channelsEl.innerHTML='';
  Object.keys(groups).sort().forEach(g=>{
    const head=document.createElement('div'); head.className='group-head'; head.innerHTML=`<span class="caret">▼</span><span class="gname">${escapeHtml(g)}</span><span class="gcount">${groups[g].length}</span>`;
    const body=document.createElement('div'); body.className='group-body';
    head.onclick=()=>{ body.classList.toggle('hidden'); head.classList.toggle('collapsed'); };
    groups[g].forEach(({c,i})=>{
      const div=document.createElement('div'); div.className='channel'+(i===activeIdx?' active':'');
      div.innerHTML=`<div class="ch-num">${i+1}</div><div class="ch-name">${escapeHtml(c.name)}</div>`;
      div.onclick=()=>play(i);
      body.appendChild(div);
    });
    channelsEl.appendChild(head); channelsEl.appendChild(body);
  });
}

function play(idx){
  const c=channels[idx]; if(!c) return;
  activeIdx=idx; renderChannels(searchInput.value);
  placeholder.style.display='none';
  npTitle.textContent=c.name; npLabel.textContent='// '+c.group;
  if(c.logo){npLogo.src=c.logo;npLogo.style.display='block';npLogo.onerror=()=>npLogo.style.display='none';}
  else npLogo.style.display='none';
  const isHls=/\.m3u8(\?|$)/i.test(c.url);
  npBadge.textContent=isHls?'EN VIVO':'media'; npBadge.className='badge'+(isHls?' live':'');
  if(hls){hls.destroy();hls=null;} video.removeAttribute('src'); video.load();
  if(isHls){
    if(window.Hls&&Hls.isSupported()){
      hls=new Hls({lowLatencyMode:true}); hls.loadSource(c.url); hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play().catch(()=>{}));
      hls.on(Hls.Events.ERROR,(e,d)=>{if(d.fatal)toast('Error al cargar stream.',true);});
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){ video.src=c.url; video.play().catch(()=>{}); }
    else toast('Tu navegador no soporta HLS.',true);
  } else { video.src=c.url; video.play().catch(()=>toast('No se puede reproducir.',true)); }
}

function loadFromText(text){
  const parsed=parseM3U(text);
  if(!parsed.length){toast('No se encontraron canales.',true);return;}
  channels=parsed; activeIdx=-1; searchInput.value=''; renderChannels();
  store.set('pvision_lastList',text);
  toast(`${parsed.length} canales cargados`);
}

async function loadFromUrl(url){
  if(!url) return;
  toast('Descargando lista…');
  try{
    const res=await fetch(url);
    if(!res.ok) throw new Error();
    const text=await res.text();
    loadFromText(text);
  }catch(err){
    toast('Error al descargar lista.',true);
  }
}

// ===== EMPAREJAMIENTO REMOTO (recibe listas del control) =====
function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c=''; for(let i=0;i<6;i++) c+=chars[Math.floor(Math.random()*chars.length)];
  return c;
}
let myCode=store.get('pvision_code');
if(!myCode){ myCode=genCode(); store.set('pvision_code',myCode); }
$('pairCode').textContent=myCode;

(function listenRemote(){
  try{
    const es=new EventSource('https://ntfy.sh/m3uplay-'+myCode+'/sse');
    es.onopen=()=>{ $('pairStatus').textContent='Conectado · listo para recibir'; $('pairStatus').style.color='#22e8e0'; };
    es.onerror=()=>{ $('pairStatus').textContent='Reconectando…'; $('pairStatus').style.color='#7f9bb5'; };
    es.onmessage=ev=>{
      try{
        const d=JSON.parse(ev.data);
        if(d.event!=='message'||!d.message) return;
        let payload; try{ payload=JSON.parse(d.message); }catch(_){ payload={url:d.message}; }
        if(payload.url){ toast('📡 Lista recibida del control'); loadFromUrl(payload.url); }
      }catch(e){}
    };
  }catch(e){ $('pairStatus').textContent='Emparejamiento no disponible aquí.'; }
})();

// Cargar última lista al abrir
(function init(){
  const last=store.get('pvision_lastList');
  if(last) loadFromText(last);
})();
</script>
